name: Build and Release

on:
  push:
    branches:
      - main
      - "feature/*"
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
      - "feature/*"

jobs:
  apk:
    name: Generate APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Branch name
        run: echo running on branch ${GITHUB_REF##*/}

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set execution flag for gradlew
        run: chmod +x gradlew

      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "Updating APP_VERSION_NAME=$VERSION APP_VERSION_CODE=$VERSION_CODE"
          sed -i "s/^APP_VERSION_NAME=.*/APP_VERSION_NAME=$VERSION/" gradle.properties
          sed -i "s/^APP_VERSION_CODE=.*/APP_VERSION_CODE=$VERSION_CODE/" gradle.properties
          grep -E "APP_VERSION" gradle.properties

      - name: Configure Gradle JVM for CI
        # 本地 gradle.properties 是为多 worktree 场景做的保守内存（Xmx=1.5G），
        # 在 CI 单次构建场景下 R8 minify 会 OOM。GitHub runner 内存约 7G，
        # 此处追加覆盖：properties 后定义生效，仅影响 CI，不污染本地配置。
        run: |
          cat >> gradle.properties <<'EOF'

          # === CI Override (GitHub Actions) ===
          org.gradle.jvmargs=-Xmx5g -Xms1g -XX:MaxMetaspaceSize=1g -XX:+UseParallelGC -Dfile.encoding=UTF-8
          org.gradle.workers.max=4
          EOF

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Decode Keystore
        id: keystore
        if: startsWith(github.ref, 'refs/tags/') && env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/release-key.jks

      - name: Build Release APK
        if: startsWith(github.ref, 'refs/tags/') && env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release-key.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Release APK
        if: startsWith(github.ref, 'refs/tags/') && env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Upload Debug APK as Fallback
        if: startsWith(github.ref, 'refs/tags/') && env.KEYSTORE_BASE64 == ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/debug/app-debug.apk

  release:
    name: Release APK
    needs: apk
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk

      - name: Rename APK if needed
        run: |
          if [ -f "app-debug.apk" ]; then
            mv app-debug.apk app-release.apk
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}